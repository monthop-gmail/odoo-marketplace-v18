<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotions - LINE LIFF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Sarabun', sans-serif; }
        .promo-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .coupon-card {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px dashed #f59e0b;
        }
        .countdown { font-variant-numeric: tabular-nums; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p class="text-gray-600">Loading Promotions...</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden pb-20">
        <!-- Header -->
        <header class="promo-gradient text-white p-4 sticky top-0 z-40 shadow-md">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-gift text-2xl"></i>
                    <div>
                        <p class="font-bold text-lg">Promotions</p>
                        <p class="text-xs opacity-80">Special Deals & Coupons</p>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="showMyCoupons()" class="bg-white/20 px-3 py-1 rounded-full text-sm">
                        <i class="fas fa-ticket-alt mr-1"></i>
                        <span id="coupon-count">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Flash Sale Banner -->
        <div id="flash-sale-banner" class="bg-red-600 text-white p-3 text-center">
            <div class="flex items-center justify-center space-x-2">
                <i class="fas fa-bolt text-yellow-300 animate-pulse"></i>
                <span class="font-bold">FLASH SALE!</span>
                <span class="countdown bg-black/30 px-2 py-1 rounded text-sm" id="flash-countdown">00:00:00</span>
            </div>
        </div>

        <!-- Promotions Page -->
        <div id="page-promotions" class="page p-4">
            <!-- Category Tabs -->
            <div class="flex space-x-2 mb-4 overflow-x-auto pb-2">
                <button class="promo-tab active px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="all">
                    <i class="fas fa-fire mr-1"></i> All
                </button>
                <button class="promo-tab px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="flash">
                    <i class="fas fa-bolt mr-1"></i> Flash Sale
                </button>
                <button class="promo-tab px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="coupon">
                    <i class="fas fa-ticket-alt mr-1"></i> Coupons
                </button>
                <button class="promo-tab px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="bundle">
                    <i class="fas fa-box-open mr-1"></i> Bundles
                </button>
                <button class="promo-tab px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="free">
                    <i class="fas fa-truck mr-1"></i> Free Ship
                </button>
            </div>

            <!-- Active Promotions -->
            <h2 class="text-lg font-semibold mb-3">
                <i class="fas fa-fire text-orange-500 mr-2"></i>Active Promotions
            </h2>
            <div id="promotions-list" class="space-y-4 mb-6">
                <!-- Promotions loaded here -->
            </div>

            <!-- Available Coupons -->
            <h2 class="text-lg font-semibold mb-3">
                <i class="fas fa-ticket-alt text-yellow-500 mr-2"></i>Available Coupons
            </h2>
            <div id="coupons-list" class="space-y-3 mb-6">
                <!-- Coupons loaded here -->
            </div>

            <!-- Special Offers -->
            <h2 class="text-lg font-semibold mb-3">
                <i class="fas fa-star text-purple-500 mr-2"></i>Special Offers
            </h2>
            <div id="special-offers" class="grid grid-cols-2 gap-3">
                <!-- Special offers loaded here -->
            </div>
        </div>

        <!-- My Coupons Page -->
        <div id="page-my-coupons" class="page hidden p-4">
            <div class="flex items-center mb-4">
                <button onclick="showPage('promotions')" class="mr-3">
                    <i class="fas fa-arrow-left text-gray-600"></i>
                </button>
                <h2 class="text-lg font-semibold">My Coupons</h2>
            </div>

            <!-- Coupon Tabs -->
            <div class="flex space-x-2 mb-4">
                <button class="coupon-tab active px-4 py-2 rounded-lg text-sm" data-status="active">
                    Active (<span id="active-coupon-count">0</span>)
                </button>
                <button class="coupon-tab px-4 py-2 rounded-lg text-sm" data-status="used">
                    Used
                </button>
                <button class="coupon-tab px-4 py-2 rounded-lg text-sm" data-status="expired">
                    Expired
                </button>
            </div>

            <div id="my-coupons-list" class="space-y-3">
                <!-- My coupons loaded here -->
            </div>
        </div>

        <!-- Promotion Detail Page -->
        <div id="page-promo-detail" class="page hidden p-4">
            <div class="flex items-center mb-4">
                <button onclick="showPage('promotions')" class="mr-3">
                    <i class="fas fa-arrow-left text-gray-600"></i>
                </button>
                <h2 class="text-lg font-semibold">Promotion Details</h2>
            </div>

            <div id="promo-detail-content">
                <!-- Detail content loaded here -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-40">
            <div class="flex justify-around py-2">
                <button class="nav-btn active flex flex-col items-center p-2" data-page="promotions">
                    <i class="fas fa-percent text-xl"></i>
                    <span class="text-xs mt-1">Promotions</span>
                </button>
                <button class="nav-btn flex flex-col items-center p-2" onclick="showMyCoupons()">
                    <i class="fas fa-ticket-alt text-xl"></i>
                    <span class="text-xs mt-1">My Coupons</span>
                </button>
                <button class="nav-btn flex flex-col items-center p-2" onclick="showHistory()">
                    <i class="fas fa-history text-xl"></i>
                    <span class="text-xs mt-1">History</span>
                </button>
                <button class="nav-btn flex flex-col items-center p-2" onclick="sharePromo()">
                    <i class="fas fa-share-alt text-xl"></i>
                    <span class="text-xs mt-1">Share</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Coupon Claim Modal -->
    <div id="claim-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-500"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Coupon Claimed!</h3>
            <p class="text-gray-600 mb-4" id="claim-message">Your coupon has been added to My Coupons.</p>
            <button onclick="closeClaimModal()" class="w-full promo-gradient text-white py-3 rounded-xl font-medium">
                Got it!
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            LIFF_ID: '',
            API_BASE: window.location.origin,
            CHANNEL_CODE: 'demo_coop',
        };

        let lineProfile = null;
        let accessToken = null;
        let flashSaleEndTime = null;

        // Initialize LIFF
        async function initLiff() {
            try {
                const liffId = new URLSearchParams(window.location.search).get('liffId') || CONFIG.LIFF_ID;

                if (liffId) {
                    await liff.init({ liffId });

                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }

                    lineProfile = await liff.getProfile();
                    accessToken = liff.getAccessToken();
                }

                await loadPromotions();
                startFlashSaleCountdown();

            } catch (error) {
                console.error('LIFF init error:', error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        // Load Promotions
        async function loadPromotions() {
            // Mock promotion data
            const promotions = [
                {
                    id: 1,
                    type: 'flash',
                    title: 'Flash Sale 50% OFF',
                    description: 'Selected items only. Limited time!',
                    discount: '50%',
                    image: 'https://via.placeholder.com/400x200/f97316/ffffff?text=FLASH+SALE',
                    endTime: new Date(Date.now() + 3600000),
                },
                {
                    id: 2,
                    type: 'bundle',
                    title: 'Buy 2 Get 1 Free',
                    description: 'Mix & match selected products',
                    discount: 'B2G1',
                    image: 'https://via.placeholder.com/400x200/8b5cf6/ffffff?text=BUY+2+GET+1',
                    endTime: new Date(Date.now() + 86400000 * 3),
                },
            ];

            const container = document.getElementById('promotions-list');
            container.innerHTML = promotions.map(promo => `
                <div class="bg-white rounded-xl shadow overflow-hidden" onclick="showPromoDetail(${promo.id})">
                    <div class="relative">
                        <img src="${promo.image}" alt="${promo.title}" class="w-full h-32 object-cover">
                        <span class="absolute top-2 left-2 bg-red-500 text-white px-2 py-1 rounded-full text-xs font-bold">
                            ${promo.discount}
                        </span>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold">${promo.title}</h3>
                        <p class="text-sm text-gray-500">${promo.description}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-xs text-gray-400">
                                <i class="fas fa-clock mr-1"></i>Ends: ${formatDate(promo.endTime)}
                            </span>
                            <button class="text-orange-500 text-sm font-medium">View <i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            loadCoupons();
            loadSpecialOffers();
        }

        // Load Coupons
        function loadCoupons() {
            const coupons = [
                { id: 1, code: 'SAVE100', discount: '฿100', minSpend: 500, expiry: '31 Jan 2026' },
                { id: 2, code: 'FIRST20', discount: '20%', minSpend: 300, expiry: '28 Feb 2026' },
                { id: 3, code: 'FREESHIP', discount: 'Free Shipping', minSpend: 200, expiry: '15 Feb 2026' },
            ];

            const container = document.getElementById('coupons-list');
            container.innerHTML = coupons.map(coupon => `
                <div class="coupon-card rounded-xl p-4 relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-2xl font-bold text-orange-600">${coupon.discount}</span>
                            <p class="text-sm text-gray-600">Min. spend ฿${coupon.minSpend}</p>
                            <p class="text-xs text-gray-400 mt-1">Valid until ${coupon.expiry}</p>
                        </div>
                        <button onclick="claimCoupon('${coupon.code}', event)"
                                class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                            Claim
                        </button>
                    </div>
                    <div class="absolute -right-2 top-1/2 transform -translate-y-1/2 w-4 h-8 bg-gray-100 rounded-l-full"></div>
                    <div class="absolute -left-2 top-1/2 transform -translate-y-1/2 w-4 h-8 bg-gray-100 rounded-r-full"></div>
                </div>
            `).join('');

            document.getElementById('coupon-count').textContent = coupons.length;
        }

        // Load Special Offers
        function loadSpecialOffers() {
            const offers = [
                { id: 1, title: 'New User', discount: '฿50 OFF', color: 'from-pink-500 to-rose-500' },
                { id: 2, title: 'Weekend', discount: '15% OFF', color: 'from-blue-500 to-cyan-500' },
                { id: 3, title: 'Member', discount: '2X Points', color: 'from-purple-500 to-indigo-500' },
                { id: 4, title: 'Refer', discount: '฿100', color: 'from-green-500 to-emerald-500' },
            ];

            const container = document.getElementById('special-offers');
            container.innerHTML = offers.map(offer => `
                <div class="bg-gradient-to-br ${offer.color} rounded-xl p-4 text-white cursor-pointer"
                     onclick="showOfferDetail(${offer.id})">
                    <p class="text-sm opacity-80">${offer.title}</p>
                    <p class="text-xl font-bold">${offer.discount}</p>
                    <i class="fas fa-arrow-right mt-2 opacity-70"></i>
                </div>
            `).join('');
        }

        // Flash Sale Countdown
        function startFlashSaleCountdown() {
            flashSaleEndTime = new Date(Date.now() + 3600000); // 1 hour from now

            setInterval(() => {
                const now = new Date();
                const diff = flashSaleEndTime - now;

                if (diff <= 0) {
                    document.getElementById('flash-countdown').textContent = 'ENDED';
                    return;
                }

                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);

                document.getElementById('flash-countdown').textContent =
                    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        // Claim Coupon
        function claimCoupon(code, event) {
            event.stopPropagation();

            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('claim-message').textContent =
                    `Coupon code "${code}" has been added to your coupons!`;
                document.getElementById('claim-modal').classList.remove('hidden');

                btn.innerHTML = '<i class="fas fa-check"></i> Claimed';
                btn.classList.remove('bg-orange-500');
                btn.classList.add('bg-gray-400');
            }, 1000);
        }

        function closeClaimModal() {
            document.getElementById('claim-modal').classList.add('hidden');
        }

        // Navigation
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageName}`).classList.remove('hidden');
        }

        function showMyCoupons() {
            showPage('my-coupons');
            loadMyCoupons();
        }

        function loadMyCoupons() {
            const myCoupons = [
                { code: 'SAVE100', discount: '฿100', expiry: '31 Jan 2026', status: 'active' },
                { code: 'WELCOME50', discount: '฿50', expiry: '15 Jan 2026', status: 'used' },
            ];

            const container = document.getElementById('my-coupons-list');
            const activeCoupons = myCoupons.filter(c => c.status === 'active');

            document.getElementById('active-coupon-count').textContent = activeCoupons.length;

            container.innerHTML = activeCoupons.map(coupon => `
                <div class="coupon-card rounded-xl p-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-xl font-bold text-orange-600">${coupon.discount}</span>
                            <p class="text-xs text-gray-400">Code: ${coupon.code}</p>
                            <p class="text-xs text-gray-400">Expires: ${coupon.expiry}</p>
                        </div>
                        <button onclick="useCoupon('${coupon.code}')"
                                class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                            Use Now
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-gray-500 py-8">No active coupons</p>';
        }

        function showPromoDetail(id) {
            showPage('promo-detail');
            // Load detail content
            document.getElementById('promo-detail-content').innerHTML = `
                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <img src="https://via.placeholder.com/400x200/f97316/ffffff?text=PROMOTION" class="w-full">
                    <div class="p-4">
                        <h3 class="text-xl font-bold mb-2">Flash Sale 50% OFF</h3>
                        <p class="text-gray-600 mb-4">Get 50% off on selected items. Limited time offer!</p>
                        <div class="bg-gray-50 rounded-lg p-3 mb-4">
                            <h4 class="font-medium mb-2">Terms & Conditions:</h4>
                            <ul class="text-sm text-gray-600 list-disc list-inside space-y-1">
                                <li>Valid for selected items only</li>
                                <li>Cannot be combined with other offers</li>
                                <li>Limited to 2 items per customer</li>
                            </ul>
                        </div>
                        <button onclick="shopNow()" class="w-full promo-gradient text-white py-3 rounded-xl font-medium">
                            Shop Now <i class="fas fa-shopping-cart ml-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function showOfferDetail(id) {
            alert(`Offer detail ${id}`);
        }

        function useCoupon(code) {
            alert(`Using coupon: ${code}`);
        }

        function showHistory() {
            alert('Promotion history');
        }

        function sharePromo() {
            if (liff.isApiAvailable('shareTargetPicker')) {
                liff.shareTargetPicker([{
                    type: 'text',
                    text: 'Check out these amazing promotions! Get up to 50% OFF!'
                }]);
            } else {
                alert('Share feature not available');
            }
        }

        function shopNow() {
            // Navigate to buyer LIFF or close
            alert('Redirecting to shop...');
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('th-TH', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Tab listeners
        document.querySelectorAll('.promo-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.promo-tab').forEach(b => {
                    b.classList.remove('active', 'promo-gradient', 'text-white');
                    b.classList.add('bg-gray-200');
                });
                btn.classList.add('active', 'promo-gradient', 'text-white');
                btn.classList.remove('bg-gray-200');
                // Filter promotions by category
            });
        });

        document.querySelectorAll('.coupon-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.coupon-tab').forEach(b => {
                    b.classList.remove('active', 'promo-gradient', 'text-white');
                    b.classList.add('bg-gray-200');
                });
                btn.classList.add('active', 'promo-gradient', 'text-white');
                btn.classList.remove('bg-gray-200');
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', initLiff);
    </script>
</body>
</html>
